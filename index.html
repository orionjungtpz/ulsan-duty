<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>울산듀티</title>

<!-- PWA 홈화면 아이콘 (splash.jpg 사용) -->
<link rel="apple-touch-icon" href="splash.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="splash.jpg">
<link rel="apple-touch-icon" sizes="152x152" href="splash.jpg">
<link rel="apple-touch-icon" sizes="120x120" href="splash.jpg">
<link rel="icon" type="image/jpeg" href="splash.jpg">

<!-- iOS 앱처럼 전체화면 실행 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="울산듀티">

<!-- 안드로이드 PWA -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="울산듀티">
<meta name="theme-color" content="#0f0f13">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --border: #2e2e3e;
  --text: #e8e8f0;
  --muted: #7878a0;
  --accent: #6c63ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  position: relative;
}

#mainApp {
  padding-top: env(safe-area-inset-top, 0px);
  padding-left: env(safe-area-inset-left, 0px);
  padding-right: env(safe-area-inset-right, 0px);
}

/* ════════════════════════════════
   SPLASH SCREEN
════════════════════════════════ */
#splashScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a0a10 url('splash.jpg') center center / cover no-repeat;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* 배경 어둡게 오버레이 */
#splashScreen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.05) 0%,
    rgba(0,0,0,0.05) 50%,
    rgba(0,0,0,0.70) 80%,
    rgba(0,0,0,0.85) 100%
  );
}

.splash-content {
  position: absolute;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 48px);
  left: 0; right: 0;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  animation: splashFadeIn 0.8s ease forwards;
}

@keyframes splashFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.splash-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: -1px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.8), 0 0 60px rgba(108,99,255,0.4);
  line-height: 1;
}

.splash-title span {
  color: #a09cff;
}

.splash-sub {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
}

.splash-dots {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.splash-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: dotPulse 1.2s ease infinite;
}
.splash-dots span:nth-child(2) { animation-delay: 0.2s; }
.splash-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.3); }
}

#splashScreen.fade-out {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

/* ════════════════════════════════
   MAIN APP (hidden until splash done)
════════════════════════════════ */
#mainApp {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#mainApp.visible { opacity: 1; }

/* ══ 헤더 ══ */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 8px;
}
.logo {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: -0.5px;
}
.logo em {
  color: var(--accent);
  font-style: normal;
}

.month-nav { display: flex; align-items: center; gap: 4px; }
.month-arrow {
  background: none; border: none;
  color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 3px 8px;
  border-radius: 6px; transition: all .15s;
}
.month-arrow:hover { background: var(--surface2); color: var(--text); }
.month-title {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  min-width: 88px; text-align: center;
}

.header-btns { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); width: 32px; height: 32px;
  border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all .15s;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); }

/* ══ 근무자 바 ══ */
.member-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex; gap: 10px;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.member-bar::-webkit-scrollbar { display: none; }

.member-chip {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  cursor: pointer; flex-shrink: 0;
  opacity: 0.42; transition: opacity .2s, transform .2s;
}
.member-chip.active { opacity: 1; }
.member-chip:hover { opacity: 0.8; transform: translateY(-1px); }

.member-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
  overflow: hidden; transition: border-color .2s, box-shadow .2s;
  position: relative;
}
.member-chip.active .member-avatar {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(108,99,255,.28);
}
.member-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.member-name {
  font-size: 10px; font-weight: 600;
  color: var(--text); white-space: nowrap;
}

/* ══ 통계 바 ══ */
.stats-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 6px 12px; display: flex; gap: 7px;
  overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface2); border-radius: 20px;
  padding: 3px 9px; font-size: 10px; white-space: nowrap;
  border: 1px solid var(--border); flex-shrink: 0;
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-label { color: var(--muted); }
.stat-val { font-weight: 700; font-family: 'Space Mono', monospace; }

/* ══ 요일 헤더 ══ */
.weekday-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.weekday-cell {
  text-align: center; padding: 5px 0;
  font-size: 10px; font-weight: 700;
  color: var(--muted); letter-spacing: .5px;
}
.weekday-cell.sun { color: #ef4444; }
.weekday-cell.sat { color: #60a5fa; }

/* ══ 캘린더 ══ */
.calendar-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.calendar-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  grid-auto-rows: 1fr; flex: 1;
  gap: 1px; background: var(--border); overflow: hidden;
}
.day-cell {
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; padding: 3px 2px 2px;
  cursor: pointer; gap: 1px;
  transition: background .12s; min-height: 0; overflow: hidden;
}
.day-cell:hover { background: var(--surface2); }
.day-cell.today .day-num {
  background: var(--accent); color: #fff;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.day-cell.other-month { opacity: 0.2; }
.day-cell.sun .day-num { color: #ef4444; }
.day-cell.sat .day-num { color: #60a5fa; }
.day-cell.today.sun .day-num, .day-cell.today.sat .day-num { color: #fff; }

.day-num { font-size: 11px; font-weight: 700; font-family: 'Space Mono', monospace; line-height: 1; }
.duty-badge {
  font-size: 8px; font-weight: 700;
  padding: 1px 3px; border-radius: 3px;
  line-height: 1.3; max-width: 100%; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.multi-badge {
  font-size: 7.5px; font-weight: 700;
  padding: 1px 3px; border-radius: 3px;
  line-height: 1.4; max-width: 100%; text-align: left;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  width: 100%;
}
.day-memo {
  font-size: 8px; color: var(--muted);
  width: 100%; text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ══ 하단 탭 ══ */
.tab-bar {
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 7px 4px; cursor: pointer; gap: 2px;
  color: var(--muted); font-size: 10px; font-weight: 500;
  transition: color .15s; border: none; background: none;
}
.tab-item.active { color: var(--accent); }
.tab-icon { font-size: 19px; line-height: 1; }

/* ══ 모달 ══ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72); backdrop-filter: blur(6px);
  z-index: 500; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 480px; padding: 14px 18px 32px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  border-top: 1px solid var(--border);
  max-height: 92dvh; overflow-y: auto;
}
.overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
.modal-title { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 3px; }
.modal-sub { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); text-align: center; margin-bottom: 14px; }

.duty-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 14px; }
.duty-btn {
  border: 2px solid transparent; border-radius: 10px;
  padding: 8px 3px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 9px; font-weight: 700;
  transition: all .15s; background: var(--surface2); color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
}
.duty-btn .btn-emoji { font-size: 16px; }
.duty-btn:hover { border-color: currentColor; }
.duty-btn.selected { border-color: currentColor !important; background: color-mix(in srgb, currentColor 18%, var(--surface2)); }

.memo-area {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; padding: 9px 11px; resize: none; outline: none;
  margin-bottom: 11px; height: 54px;
}
.memo-area::placeholder { color: var(--muted); }
.memo-area:focus { border-color: var(--accent); }

.modal-actions { display: flex; gap: 8px; }
.btn-cancel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 12px; padding: 12px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all .15s;
}
.btn-cancel:hover { color: var(--text); }
.btn-save {
  flex: 2; background: var(--accent); border: none;
  color: #fff; border-radius: 12px; padding: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: background .15s;
}
.btn-save:hover { background: #5855e8; }

/* ══ 슬라이드 패널 ══ */
.side-panel {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 400; display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
.side-panel.show { transform: translateX(0); }
.panel-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding-top: calc(env(safe-area-inset-top, 0px) + 13px);
  padding-bottom: 13px; padding-left: 16px; padding-right: 16px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.panel-back {
  background: none; border: none; color: var(--accent);
  font-size: 14px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.panel-title { font-size: 15px; font-weight: 700; }
.panel-body { flex: 1; overflow-y: auto; padding: 14px; }

.sec-label {
  font-size: 10px; font-weight: 700; color: var(--muted);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px; margin-top: 18px;
}
.sec-label:first-child { margin-top: 0; }

.row-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 13px; margin-bottom: 7px;
}
.row-label { font-size: 13px; font-weight: 500; }
.row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ══ 멤버 카드 (설정) ══ */
.member-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
  transition: border-color .2s;
}
.member-card.active-card { border-color: var(--accent); }

.mc-avatar-wrap {
  position: relative; flex-shrink: 0;
  width: 56px; height: 56px;
}
.mc-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  border: 2.5px solid var(--border); background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer;
  transition: border-color .2s;
}
.mc-avatar:hover { border-color: var(--accent); }
.mc-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mc-initials { font-size: 16px; font-weight: 700; color: var(--muted); }
.mc-cam-btn {
  position: absolute;
  bottom: 0; right: 0;
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  cursor: pointer;
  transition: transform .15s;
}
.mc-cam-btn:hover { transform: scale(1.15); }

.mc-info { flex: 1; min-width: 0; }
.mc-name { font-size: 15px; font-weight: 700; }
.mc-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
.mc-del-btn {
  background: none; border: 1px solid #ef444440;
  color: #ef4444; border-radius: 7px; padding: 4px 8px;
  font-size: 10px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all .15s;
  display: none;
}
.mc-del-btn.visible { display: block; }
.mc-del-btn:hover { background: #ef444420; }

.mc-select-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px; padding: 6px 11px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all .15s; flex-shrink: 0;
  margin-left: 4px;
}
.mc-select-btn:hover { color: var(--text); border-color: var(--accent); }
.mc-select-btn.sel { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ══ 내보내기 ══ */
.export-btn {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 12px; padding: 12px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  margin-bottom: 7px; transition: all .15s;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ══ 목록 아이템 ══ */
.list-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 11px; padding: 11px 12px; margin-bottom: 7px;
}
.li-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; width: 58px; }
.li-badge { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; flex-shrink: 0; white-space: nowrap; }
.li-memo { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ══ 오늘 배너 ══ */
.today-banner {
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, var(--surface)), var(--surface));
  border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
  border-radius: 14px; padding: 12px 14px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 12px;
}
.tb-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid var(--border);
  overflow: hidden; flex-shrink: 0;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
}
.tb-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tb-info { flex: 1; }
.tb-name { font-size: 11px; color: var(--muted); }
.tb-duty { font-size: 17px; font-weight: 900; margin-top: 2px; }
.tb-memo { font-size: 10px; color: var(--muted); margin-top: 2px; }
</style>

</head>
<body>

<!-- ═══════════════════════════════════
  SPLASH SCREEN
═══════════════════════════════════ -->
<div id="splashScreen">
  <div class="splash-content">
    <div class="splash-title">울산<em>듀티</em></div>
    <div class="splash-sub">근무표 관리 시스템</div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
  MAIN APP
═══════════════════════════════════ -->
<div id="mainApp">

  <!-- 헤더 -->
  <header>
    <div class="logo">울산<em>듀티</em></div>
    <div class="month-nav">
      <button class="month-arrow" id="prevMonth">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="month-arrow" id="nextMonth">›</button>
    </div>
    <div class="header-btns">
      <button class="icon-btn" id="btnToday" title="오늘">⊙</button>
      <button class="icon-btn" id="btnList" title="목록">☰</button>
    </div>
  </header>

  <!-- 근무자 바 -->
  <div class="member-bar" id="memberBar"></div>

  <!-- 통계 바 -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- 요일 -->
  <div class="weekday-row">
    <div class="weekday-cell sun">일</div>
    <div class="weekday-cell">월</div>
    <div class="weekday-cell">화</div>
    <div class="weekday-cell">수</div>
    <div class="weekday-cell">목</div>
    <div class="weekday-cell">금</div>
    <div class="weekday-cell sat">토</div>
  </div>

  <!-- 캘린더 -->
  <div class="calendar-wrap">
    <div class="calendar-grid" id="calGrid"></div>
  </div>

  <!-- 하단 탭 -->
  <div class="tab-bar">
    <button class="tab-item active" id="tabCal" onclick="switchTab('cal')"><span class="tab-icon">📅</span>달력</button>
    <button class="tab-item" id="tabToday" onclick="switchTab('today')"><span class="tab-icon">☀️</span>오늘</button>

<script>
// ━━━ Firebase 동적 로딩 ━━━━━━━━━━━━━━━━━━━━━━━━
const firebaseConfig = {
  apiKey:            "AIzaSyCpaIMH1SSAJSfk_1O69A7m7u2ZtesdtEg",
  authDomain:        "ulsan-duty.firebaseapp.com",
  databaseURL:       "https://ulsan-duty-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "ulsan-duty",
  storageBucket:     "ulsan-duty.firebasestorage.app",
  messagingSenderId: "434652610615",
  appId:             "1:434652610615:web:fb610fe2638e6ef088bfb2"
};

let db = null;

function loadFirebaseSDK() {
  return new Promise((resolve) => {
    if (typeof firebase !== 'undefined') { resolve(); return; }
    const s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
      s2.onload = () => resolve();
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  });
}

// ━━━ 상수 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MEMBERS = [
  { id:'han_sh',  name:'한승호', short:'승호' },
  { id:'lee_jh',  name:'이종현', short:'종현' },
  { id:'park_hc', name:'박현창', short:'현창' },
  { id:'lee_kw',  name:'이기원', short:'기원' },
  { id:'han_sk',  name:'한석희', short:'석희' },
  { id:'lee_jl',  name:'이진렬', short:'진렬' },
];

const DUTY_TYPES = [
  { id:'day',    label:'Day',     sub:'07:00~15:00', emoji:'☀️',  color:'#f59e0b' },
  { id:'day2',   label:'Day2',    sub:'07:00~19:00', emoji:'🌤️',  color:'#f97316' },
  { id:'day3',   label:'Day',     sub:'08:00~17:30', emoji:'🌞',  color:'#eab308' },
  { id:'day4',   label:'Day',     sub:'06:00~14:00', emoji:'🌅',  color:'#fb923c' },
  { id:'day5',   label:'Day',     sub:'06:00~15:00', emoji:'🌄',  color:'#f59e0b' },
  { id:'eve',    label:'Evening', sub:'15:00~23:00', emoji:'🌆',  color:'#8b5cf6' },
  { id:'eve2',   label:'Evening', sub:'14:00~22:00', emoji:'🌇',  color:'#a855f7' },
  { id:'night',  label:'Night',   sub:'23:00~07:00', emoji:'🌙',  color:'#3b82f6' },
  { id:'night2', label:'Night2',  sub:'19:00~07:00', emoji:'🌃',  color:'#06b6d4' },
  { id:'night3', label:'Night',   sub:'22:00~06:00', emoji:'🌌',  color:'#6366f1' },
  { id:'off',    label:'오프',    sub:'Off Day',     emoji:'✨',  color:'#64748b' },
  { id:'office',  label:'Office',  sub:'08:00~17:00', emoji:'💼',  color:'#0ea5e9' },
  { id:'vac',    label:'휴가',    sub:'Vacation',    emoji:'🏖️',  color:'#10b981' },
  { id:'edu',    label:'교육',    sub:'Education',   emoji:'📚',  color:'#a78bfa' },
];

// 멤버별 표시할 근무유형 세트
const MEMBER_DUTY_SETS = {
  'han_sh':  ['day3', 'off', 'vac', 'edu'],
  'lee_jh':  ['day', 'day2', 'eve', 'night', 'night2', 'off', 'vac', 'edu'],
  'park_hc': ['day2', 'night2', 'vac', 'edu'],
  'lee_kw':  ['day4', 'eve2', 'night3', 'off', 'office', 'vac', 'edu'],
  'han_sk':  ['day5', 'off', 'vac', 'edu'],
  'lee_jl':  ['day4', 'eve2', 'night3', 'off', 'office', 'vac', 'edu'],
};

function getMemberDutyTypes(memberId) {
  const set = MEMBER_DUTY_SETS[memberId];
  if (!set) return DUTY_TYPES;
  return set.map(id => DUTY_TYPES.find(dt => dt.id === id)).filter(Boolean);
}

const TODAY   = new Date();
const pad     = n => String(n).padStart(2,'0');
const dateKey = (y,m,d) => `${y}-${pad(m)}-${pad(d)}`;
const DAYS_KR = ['일','월','화','수','목','금','토'];

// ━━━ 상태 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentYear, currentMonth;
let activeMemberId   = 'ALL';
let allData          = {};
let photos           = {};
let customDutyTypes  = {}; // 멤버별 커스텀 근무유형 { memberId: [{id,label,sub,emoji,color},...] }
let selectedDutyType = null;
let editingDate      = null;
let photoTargetId    = null;

// ━━━ Firebase 연동 ━━━━━━━━━━━━━━━━━━━━━━━━━━━
const memberData = (id) => { const mid = id || activeMemberId; return mid === 'ALL' ? {} : (allData[mid] || {}); };

function saveData() {
  db.ref('allData').set(allData).catch(e => console.error('saveData:', e));
}
function savePhotos() {
  db.ref('photos').set(photos).catch(e => console.error('savePhotos:', e));
}

function loadData() {
  db.ref('allData').on('value', snap => {
    allData = snap.val() || {};
    MEMBERS.forEach(m => { if (!allData[m.id]) allData[m.id] = {}; });
    renderCalendar();
    renderMemberBar();
  });
  db.ref('photos').on('value', snap => {
    photos = snap.val() || {};
    renderMemberBar();
    const sp = document.getElementById('settingsPanel');
    if (sp && sp.classList.contains('show')) renderSettingsPanel();
  });
  db.ref('customDutyTypes').on('value', snap => {
    customDutyTypes = snap.val() || {};
  });
}

function saveCustomDutyTypes() {
  db.ref('customDutyTypes').set(customDutyTypes).catch(e => console.error('saveCustom:', e));
}

// 멤버별 전체 근무유형 (기본 + 커스텀)
function getAllDutyTypes(memberId) {
  const base   = getMemberDutyTypes(memberId);
  const custom = (customDutyTypes[memberId] || []);
  return [...base, ...custom];
}

// ━━━ 스플래시 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initSplash() {
  // 2초 후 페이드 아웃
  setTimeout(() => {
    const splash = document.getElementById('splashScreen');
    const app    = document.getElementById('mainApp');
    splash.classList.add('fade-out');
    app.classList.add('visible');
    setTimeout(() => { splash.style.display = 'none'; }, 700);
  }, 2000);
}

// ━━━ 멤버 바 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderMemberBar() {
  const bar = document.getElementById('memberBar');
  bar.innerHTML = '';

  // ALL 탭
  const allChip = document.createElement('div');
  allChip.className = 'member-chip' + (activeMemberId === 'ALL' ? ' active' : '');
  allChip.onclick = () => { activeMemberId = 'ALL'; renderMemberBar(); renderCalendar(); };
  allChip.innerHTML = `
    <div class="member-avatar" style="background:${activeMemberId==='ALL'?'var(--accent)':'var(--surface2)'};border-color:${activeMemberId==='ALL'?'var(--accent)':'var(--border)'};font-size:11px;color:#fff;font-weight:900">ALL</div>
    <div class="member-name">전체</div>`;
  bar.appendChild(allChip);

  MEMBERS.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'member-chip' + (m.id === activeMemberId ? ' active' : '');
    chip.onclick = () => { activeMemberId = m.id; renderMemberBar(); renderCalendar(); };
    const photo = photos[m.id];
    chip.innerHTML = `
      <div class="member-avatar">
        ${photo ? `<img src="${photo}" alt="${m.name}">` : m.short}
      </div>
      <div class="member-name">${m.name.slice(0,3)}</div>`;
    bar.appendChild(chip);
  });
}

// ━━━ 캘린더 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  document.getElementById('monthTitle').textContent = `${currentYear}.${pad(currentMonth)}`;

  const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth, 0).getDate();
  const prevLast = new Date(currentYear, currentMonth - 1, 0).getDate();
  const total    = Math.ceil((firstDay + lastDate) / 7) * 7;
  const data     = memberData();

  for (let i = 0; i < total; i++) {
    let d, m, y, other = false;
    if (i < firstDay) {
      d = prevLast - firstDay + i + 1;
      m = currentMonth - 1 < 1 ? 12 : currentMonth - 1;
      y = currentMonth - 1 < 1 ? currentYear - 1 : currentYear;
      other = true;
    } else if (i >= firstDay + lastDate) {
      d = i - firstDay - lastDate + 1;
      m = currentMonth + 1 > 12 ? 1 : currentMonth + 1;
      y = currentMonth + 1 > 12 ? currentYear + 1 : currentYear;
      other = true;
    } else { d = i - firstDay + 1; m = currentMonth; y = currentYear; }

    const dow     = i % 7;
    const isToday = y===TODAY.getFullYear() && m===TODAY.getMonth()+1 && d===TODAY.getDate();
    const key     = dateKey(y, m, d);
    const entry   = data[key];

    const cell = document.createElement('div');
    cell.className = ['day-cell', dow===0?'sun':'', dow===6?'sat':'', other?'other-month':'', isToday?'today':''].filter(Boolean).join(' ');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    if (activeMemberId === 'ALL') {
      // ALL 탭: 입력된 멤버 전체 표시
      MEMBERS.forEach(mem => {
        const memEntry = (allData[mem.id] || {})[key];
        if (!memEntry) return;
        const allTypes = [...DUTY_TYPES, ...(customDutyTypes[mem.id] || [])];
        const dt = allTypes.find(t => t.id === memEntry.type);
        if (!dt) return;
        const badge = document.createElement('div');
        badge.className = 'multi-badge';
        badge.innerHTML = `<span style="opacity:.6">${mem.name.slice(0,2)}</span> ${dt.label}`;
        badge.style.cssText = `background:${dt.color}22;color:${dt.color}`;
        cell.appendChild(badge);
      });
    } else {
      // 개인 탭: 본인 근무만 표시
      const entry = (allData[activeMemberId] || {})[key];
      if (entry) {
        const allTypes = [...DUTY_TYPES, ...(customDutyTypes[activeMemberId] || [])];
        const dt = allTypes.find(t => t.id === entry.type);
        if (dt) {
          const badge = document.createElement('div');
          badge.className = 'duty-badge';
          badge.textContent = dt.emoji + ' ' + dt.label;
          badge.style.cssText = `background:${dt.color}28;color:${dt.color}`;
          cell.appendChild(badge);
        }
        if (entry.memo) {
          const memo = document.createElement('div');
          memo.className = 'day-memo';
          memo.textContent = entry.memo;
          cell.appendChild(memo);
        }
      }
    }

    cell.onclick = () => {
      if (activeMemberId === 'ALL') openAllDayModal(y, m, d);
      else openDayModal(y, m, d);
    };
    grid.appendChild(cell);
  }
  renderStats();
}

// ━━━ 통계 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStats() {
  const bar    = document.getElementById('statsBar');
  bar.innerHTML = '';
  const prefix = `${currentYear}-${pad(currentMonth)}-`;
  const counts = {};
  DUTY_TYPES.forEach(dt => counts[dt.id] = 0);

  if (activeMemberId === 'ALL') {
    // 전체 합산
    const nc = document.createElement('div');
    nc.className = 'stat-chip';
    nc.innerHTML = `<span style="color:var(--accent);font-weight:700;font-size:11px">전체</span>`;
    bar.appendChild(nc);
    MEMBERS.forEach(mem => {
      const data = allData[mem.id] || {};
      Object.keys(data).forEach(k => { if (k.startsWith(prefix) && counts[data[k].type] !== undefined) counts[data[k].type]++; });
    });
    DUTY_TYPES.forEach(dt => {
      if (!counts[dt.id]) return;
      const chip = document.createElement('div');
      chip.className = 'stat-chip';
      chip.innerHTML = `<div class="stat-dot" style="background:${dt.color}"></div><span class="stat-label">${dt.label}</span><span class="stat-val" style="color:${dt.color}">${counts[dt.id]}</span>`;
      bar.appendChild(chip);
    });
  } else {
    const data = memberData();
    Object.keys(data).forEach(k => { if (k.startsWith(prefix) && counts[data[k].type] !== undefined) counts[data[k].type]++; });
    const mem = MEMBERS.find(x => x.id === activeMemberId);
    const nc  = document.createElement('div');
    nc.className = 'stat-chip';
    nc.innerHTML = `<span style="color:var(--accent);font-weight:700;font-size:11px">${mem.name}</span>`;
    bar.appendChild(nc);
    getAllDutyTypes(activeMemberId).forEach(dt => {
      if (!counts[dt.id]) return;
      const chip = document.createElement('div');
      chip.className = 'stat-chip';
      chip.innerHTML = `<div class="stat-dot" style="background:${dt.color}"></div><span class="stat-label">${dt.label}</span><span class="stat-val" style="color:${dt.color}">${counts[dt.id]}</span>`;
      bar.appendChild(chip);
    });
  }
}

// ━━━ ALL 날짜 모달 (전체 현황) ━━━━━━━━━━━━━━━━━
function openAllDayModal(y, m, d) {
  const dow = new Date(y, m-1, d).getDay();
  const key = dateKey(y, m, d);

  // 모달 타이틀 재활용
  document.getElementById('modalMemberName').textContent = `${y}년 ${m}월 ${d}일 (${DAYS_KR[dow]}) 전체 현황`;
  document.getElementById('modalDateTxt').textContent = '';

  const grid = document.getElementById('dutyGrid');
  grid.style.gridTemplateColumns = '1fr';
  grid.innerHTML = '';

  let hasAny = false;
  MEMBERS.forEach(mem => {
    const entry = (allData[mem.id] || {})[key];
    const allTypes = [...DUTY_TYPES, ...(customDutyTypes[mem.id] || [])];
    const dt = entry ? allTypes.find(t => t.id === entry.type) : null;
    const photo = photos[mem.id];

    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface2);border-radius:12px;border:1px solid var(--border)';
    row.innerHTML = `
      <div style="width:38px;height:38px;border-radius:50%;overflow:hidden;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0">
        ${photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover">` : mem.short}
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${mem.name}</div>
        <div style="font-size:12px;margin-top:2px;color:${dt ? dt.color : 'var(--muted)'}">
          ${dt ? dt.emoji + ' ' + dt.label + ' <span style="opacity:.7;font-size:10px">' + dt.sub + '</span>' : '미입력'}
        </div>
        ${entry?.memo ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">${entry.memo}</div>` : ''}
      </div>`;

    // 탭하면 해당 멤버로 전환 후 입력 모달 열기
    row.onclick = () => {
      activeMemberId = mem.id;
      renderMemberBar();
      grid.style.gridTemplateColumns = 'repeat(4,1fr)';
      document.getElementById('dayOverlay').classList.remove('show');
      setTimeout(() => openDayModal(y, m, d), 150);
    };
    row.style.cursor = 'pointer';
    grid.appendChild(row);
    hasAny = true;
  });

  if (!hasAny) grid.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px">입력된 근무가 없습니다</div>';

  document.getElementById('memoInput').style.display = 'none';
  document.querySelector('.modal-actions').style.display = 'none';
  document.getElementById('dayOverlay').classList.add('show');
}

// ━━━ 날짜 모달 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openDayModal(y, m, d) {
  editingDate      = dateKey(y, m, d);
  selectedDutyType = null;
  const mem   = MEMBERS.find(x => x.id === activeMemberId);
  const dow   = new Date(y, m-1, d).getDay();
  const entry = memberData()[editingDate];

  document.getElementById('modalMemberName').textContent = mem.name;
  document.getElementById('modalDateTxt').textContent    = `${y}년 ${m}월 ${d}일 (${DAYS_KR[dow]})`;
  document.getElementById('memoInput').value = entry?.memo || '';
  if (entry) selectedDutyType = entry.type;

  const grid = document.getElementById('dutyGrid');
  grid.innerHTML = '';
  const activeDutyTypes = getAllDutyTypes(activeMemberId);
  activeDutyTypes.forEach(dt => {
    const btn = document.createElement('button');
    btn.className = 'duty-btn' + (selectedDutyType === dt.id ? ' selected' : '');
    btn.style.color = dt.color;
    btn.id = 'dbtn_' + dt.id;
    btn.innerHTML = `<span class="btn-emoji">${dt.emoji}</span>${dt.label}<span style="font-size:8px;opacity:.7;font-weight:400">${dt.sub}</span>`;
    btn.onclick = () => selectDutyType(dt.id);
    grid.appendChild(btn);
  });

  if (entry) {
    const del = document.createElement('button');
    del.className = 'duty-btn';
    del.style.color = '#ef4444';
    del.innerHTML = '<span class="btn-emoji">🗑️</span>삭제';
    del.onclick = () => { delete allData[activeMemberId][editingDate]; saveData(); renderCalendar(); closeDayModal(); };
    grid.appendChild(del);
  }

  document.getElementById('dayOverlay').classList.add('show');
}

function selectDutyType(id) {
  selectedDutyType = id;
  document.querySelectorAll('.duty-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('dbtn_' + id)?.classList.add('selected');
}

function saveDuty() {
  if (!selectedDutyType || !editingDate) { closeDayModal(); return; }
  if (!allData[activeMemberId]) allData[activeMemberId] = {};
  allData[activeMemberId][editingDate] = {
    type: selectedDutyType,
    memo: document.getElementById('memoInput').value.trim()
  };
  saveData(); renderCalendar(); closeDayModal();
}

function closeDayModal(e) {
  if (e && e.target !== document.getElementById('dayOverlay')) return;
  document.getElementById('dayOverlay').classList.remove('show');
  // ALL 모달에서 숨긴 요소 복원
  document.getElementById('memoInput').style.display = '';

// ━━━ 스와이프로 패널 닫기 ━━━━━━━━━━━━━━━━━━━━━
function initSwipe(panelId) {
  const el = document.getElementById(panelId);
  let startX = 0, startY = 0, isDragging = false;

  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (!isDragging && dx > 10 && dy < 40) isDragging = true;
    if (isDragging && dx > 0) {
      el.style.transition = 'none';
      el.style.transform = `translateX(${dx}px)`;
    }
  }, { passive: true });

  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    el.style.transition = '';
    if (dx > 80) {
      closePanel(panelId);
    }
    el.style.transform = '';
  }, { passive: true });
}

  const dow  = TODAY.getDay();

  body.innerHTML = `<div class="sec-label">오늘 ${y}.${pad(m)}.${pad(d)} ${DAYS_KR[dow]}요일</div>`;

  MEMBERS.forEach(mem => {
    const entry = (allData[mem.id] || {})[key];
    const dt    = entry ? DUTY_TYPES.find(t => t.id === entry.type) : null;
    const photo = photos[mem.id];
    body.innerHTML += `
      <div class="today-banner">
        <div class="tb-avatar">${photo ? `<img src="${photo}" alt="${mem.name}">` : mem.short}</div>

    body.innerHTML += `

// ━━━ 근무유형 에디터 ━━━━━━━━━━━━━━━━━━━━━━━━━
const EMOJI_LIST  = ['☀️','🌤️','🌞','🌅','🌄','🌆','🌇','🌙','🌃','🌌','🌛','⭐','✨','🏖️','📚','💼','🔧','⚡','🚑','🛡️','🎯','💤'];
const COLOR_LIST  = ['#f59e0b','#f97316','#eab308','#fb923c','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#a855f7','#ec4899','#ef4444','#64748b','#a78bfa'];

let dutyEditorMemberId = null;
let dutyEditorIndex    = -1; // -1 = 신규
let selectedEditorEmoji = '⭐';
let selectedEditorColor = '#f59e0b';

function openDutyEditor(memberId, idx) {
  dutyEditorMemberId = memberId;
  dutyEditorIndex    = idx;
  const isNew = idx === -1;
  const existing = isNew ? null : (customDutyTypes[memberId] || [])[idx];

  document.getElementById('dutyEditorTitle').textContent = isNew ? '근무 유형 추가' : '근무 유형 수정';
  document.getElementById('dutyLabel').value  = existing?.label || '';
  document.getElementById('customEmoji').value = existing?.emoji || '';

  // 시간 파싱
  const sub = existing?.sub || '';
  const times = sub.match(/(\d{2}:\d{2})~(\d{2}:\d{2})/);
  document.getElementById('dutyStart').value = times ? times[1] : '';
  document.getElementById('dutyEnd').value   = times ? times[2] : '';

  selectedEditorEmoji = existing?.emoji  || '⭐';
  selectedEditorColor = existing?.color  || '#f59e0b';

  renderEmojiPicker();
  renderColorPicker();
  updatePreview();

  document.getElementById('dutyEditorOverlay').classList.add('show');
}

function renderEmojiPicker() {
  const wrap = document.getElementById('emojiPicker');
  wrap.innerHTML = '';
  EMOJI_LIST.forEach(em => {
    const btn = document.createElement('button');
    btn.textContent = em;
    btn.style.cssText = `font-size:22px;width:40px;height:40px;border-radius:10px;border:2px solid ${em===selectedEditorEmoji?'var(--accent)':'var(--border)'};background:${em===selectedEditorEmoji?'rgba(108,99,255,.15)':'var(--surface2)'};cursor:pointer;transition:all .1s`;
    btn.onclick = () => { selectedEditorEmoji = em; document.getElementById('customEmoji').value = em; renderEmojiPicker(); updatePreview(); };
    wrap.appendChild(btn);
  });
}

function renderColorPicker() {
  const wrap = document.getElementById('colorPicker');
  wrap.innerHTML = '';
  COLOR_LIST.forEach(c => {
    const btn = document.createElement('button');
    btn.style.cssText = `width:30px;height:30px;border-radius:50%;background:${c};border:3px solid ${c===selectedEditorColor?'#fff':'transparent'};cursor:pointer;transition:all .1s;outline:${c===selectedEditorColor?'2px solid '+c:'none'}`;
    btn.onclick = () => { selectedEditorColor = c; renderColorPicker(); updatePreview(); };
    wrap.appendChild(btn);
  });
  // 직접 입력 color picker
  const inp = document.createElement('input');
  inp.type = 'color'; inp.value = selectedEditorColor;
  inp.style.cssText = 'width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;padding:0;background:none';
  inp.oninput = e => { selectedEditorColor = e.target.value; renderColorPicker(); updatePreview(); };
  wrap.appendChild(inp);
}

function syncEmojiInput(val) {
  if (val) { selectedEditorEmoji = val; renderEmojiPicker(); updatePreview(); }
}

function updatePreview() {
  const label = document.getElementById('dutyLabel').value || '미리보기';
  const badge = document.getElementById('previewBadge');
  badge.textContent = selectedEditorEmoji + ' ' + label;
  badge.style.cssText = `font-size:14px;font-weight:700;padding:6px 14px;border-radius:8px;background:${selectedEditorColor}28;color:${selectedEditorColor}`;
}

function closeDutyEditor(e) {
  if (e && e.target !== document.getElementById('dutyEditorOverlay')) return;
  document.getElementById('dutyEditorOverlay').classList.remove('show');
}

function saveDutyEditor() {
  const label = document.getElementById('dutyLabel').value.trim();
  const start = document.getElementById('dutyStart').value;
  const end   = document.getElementById('dutyEnd').value;
  if (!label) { alert('타이틀을 입력해주세요'); return; }

  const sub = (start && end) ? `${start}~${end}` : '시간 미설정';
  const newDt = {
    id:    'custom_' + dutyEditorMemberId + '_' + Date.now(),
    label, sub,
    emoji: selectedEditorEmoji,
    color: selectedEditorColor,
  };

  if (!customDutyTypes[dutyEditorMemberId]) customDutyTypes[dutyEditorMemberId] = [];

  if (dutyEditorIndex === -1) {
    customDutyTypes[dutyEditorMemberId].push(newDt);
  } else {
    // 수정 시 id 유지
    newDt.id = (customDutyTypes[dutyEditorMemberId][dutyEditorIndex] || {}).id || newDt.id;
    customDutyTypes[dutyEditorMemberId][dutyEditorIndex] = newDt;
  }

  saveCustomDutyTypes();
  document.getElementById('dutyEditorOverlay').classList.remove('show');
  renderSettingsPanel();
}

function deleteCustomDuty(memberId, idx) {
  if (!confirm('이 근무 유형을 삭제할까요?')) return;
  customDutyTypes[memberId].splice(idx, 1);
  saveCustomDutyTypes();
  renderSettingsPanel();
}

// 라벨 실시간 미리보기
setTimeout(() => {
  const lbl = document.getElementById('dutyLabel');
  if (lbl) lbl.addEventListener('input', updatePreview);
}, 500);

// ━━━ 사진 업로드 ━━━━━━━━━━━━━━━━━━━━━━━━━━━
function triggerPhotoUpload(memberId) {
  photoTargetId = memberId;
  document.getElementById('photoInput').click();
}

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file || !photoTargetId) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // 정방형 크롭 + 리사이즈
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 240;
      const ctx = canvas.getContext('2d');
      const s   = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 240, 240);
      photos[photoTargetId] = canvas.toDataURL('image/jpeg', 0.85);
      savePhotos();
      renderMemberBar();
      renderSettingsPanel(); // 설정 패널 갱신
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function deletePhoto(memberId) {
  if (!confirm(`${MEMBERS.find(m=>m.id===memberId)?.name}의 사진을 삭제할까요?`)) return;
  delete photos[memberId];
  savePhotos();
  renderMemberBar();
  renderSettingsPanel();
}

// ━━━ 내보내기 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function exportCSV() {
  let csv = '이름,날짜,요일,근무유형,시간,메모\n';
  MEMBERS.forEach(mem => {
    const data = allData[mem.id] || {};
    Object.keys(data).sort().forEach(k => {
      const [y,m,d] = k.split('-');
      const dow = DAYS_KR[new Date(y,m-1,d).getDay()];
      const dt  = DUTY_TYPES.find(t => t.id === data[k].type);
      csv += `${mem.name},${k},${dow},${dt?.label||''},${dt?.sub||''},"${(data[k].memo||'').replace(/"/g,'""')}"\n`;
    });
  });
  dl(csv, `울산듀티_${currentYear}${pad(currentMonth)}.csv`, 'text/csv;charset=utf-8;');
}

function exportJSON() {
  dl(JSON.stringify({version:2, allData}, null, 2), `울산듀티_백업_${Date.now()}.json`, 'application/json');
}

function importJSON() { document.getElementById('importFile').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.allData)       allData = d.allData;
      else if (d.dutyData) allData[activeMemberId] = d.dutyData;
      MEMBERS.forEach(m => { if (!allData[m.id]) allData[m.id] = {}; });
      saveData(); renderCalendar(); renderMemberBar(); alert('불러오기 완료!');
    } catch { alert('파일 형식이 올바르지 않습니다.'); }
  };
  reader.readAsText(file); e.target.value = '';
}

function clearAll() {
  if (!confirm('모든 근무 데이터를 삭제합니까?\n(사진은 유지됩니다)')) return;
  MEMBERS.forEach(m => allData[m.id] = {});
  db.ref('allData').set(allData).then(() => {
    renderCalendar(); renderMemberBar();
  });
}

function dl(content, filename, mime) {
  const blob = new Blob(['\uFEFF' + content], {type: mime});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = filename; a.click();
}

// ━━━ 초기화 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initApp() {
  const now    = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth() + 1;

  document.getElementById('prevMonth').onclick = () => {
    if (--currentMonth < 1)  { currentMonth = 12; currentYear--; }
    renderCalendar();
  };
  document.getElementById('nextMonth').onclick = () => {
    if (++currentMonth > 12) { currentMonth = 1;  currentYear++; }
    renderCalendar();
  };
  document.getElementById('btnToday').onclick = () => {
    currentYear = now.getFullYear(); currentMonth = now.getMonth()+1;
    renderCalendar();
  };
  document.getElementById('btnList').onclick = openListPanel;

  initSplash();
  loadData();
  renderMemberBar();
  renderCalendar();
  initSwipe('todayPanel');
  initSwipe('listPanel');
  initSwipe('settingsPanel');
}

// Firebase SDK 로드 후 앱 시작
loadFirebaseSDK().then(() => {
  const firebaseApp = firebase.initializeApp(firebaseConfig);
  db = firebaseApp.database();
  initApp();
});
</script>
